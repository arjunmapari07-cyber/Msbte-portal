<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MSBTE Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ══ RESET ══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1a4fa0;--blue-dark:#0d3278;--orange:#f97316;--orange-dark:#ea580c;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;
  --g800:#1e293b;--g900:#0f172a;--red:#dc2626;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --sh-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --sh-xl:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04);
  --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;
  --nav-h:52px;--mob-tab-h:52px;
  --pad:clamp(.875rem,3vw,1.5rem);--max-w:1280px;
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:#eef2f9;color:var(--g800);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--g100)}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

/* ══ LAYOUT ══ */
.page-wrap{width:100%;max-width:var(--max-w);margin:0 auto;padding:clamp(1rem,3vw,1.75rem) var(--pad)}
.page-wrap-sm{width:100%;max-width:1100px;margin:0 auto;padding:clamp(1rem,3vw,1.75rem) var(--pad)}

/* ══ CARDS ══ */
.card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-sm);border:1px solid var(--g100)}
.card-hover{transition:transform .2s ease,box-shadow .2s ease}
.card-hover:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}

/* ══ NAVBAR ══ */
.nav-root{background:linear-gradient(100deg,#0b2d6e,#1a4fa0,#1d4ed8);box-shadow:0 2px 16px rgba(11,45,110,.35);position:sticky;top:0;z-index:500;width:100%}
.nav-top{height:var(--nav-h);display:flex;align-items:center;gap:.75rem;padding:0 var(--pad);max-width:var(--max-w);margin:0 auto;overflow:hidden}
.nav-logo{display:flex;align-items:center;gap:.5rem;cursor:pointer;flex-shrink:0}
.nav-logo-icon{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.nav-logo-text{color:#fff;font-weight:800;font-size:.875rem;font-family:'Space Grotesk',sans-serif;line-height:1.2}
.nav-logo-sub{font-size:.45rem;font-weight:500;opacity:.65;letter-spacing:1.5px;text-transform:uppercase;display:block}
.nav-tabs{display:flex;gap:0;flex:1;margin-left:1rem;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.85);padding:.5rem .75rem;border-radius:8px 8px 0 0;font-weight:600;cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:.3rem}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-tab.active{color:#fff;font-weight:800;background:rgba(255,255,255,.18);border-bottom-color:#fb923c}
.nav-actions{display:flex;gap:.375rem;flex-shrink:0;margin-left:auto}
.nav-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;padding:.35rem .75rem;border-radius:7px;font-weight:600;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s}
.nav-btn-orange{background:linear-gradient(135deg,#ea580c,#f97316);border:none;color:#fff;padding:.35rem .875rem;border-radius:7px;font-weight:700;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.mob-tabbar{display:none;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.2)}
.mob-tabbar::-webkit-scrollbar{display:none}
.mob-tabbar-inner{display:flex;width:100%}
.mob-tab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.72);padding:.45rem .5rem;cursor:pointer;font-family:'Inter',sans-serif;font-size:.65rem;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:.15rem;white-space:nowrap;flex:1;min-width:52px;transition:all .15s}
.mob-tab.active{color:#fff;font-weight:700;border-bottom-color:#fb923c;background:rgba(255,255,255,.06)}
.mob-tab-icon{font-size:1.1rem;line-height:1}

/* ══ HERO ══ */
.hero{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,#3b82f6 100%);border-radius:var(--r-xl);padding:clamp(1.5rem,5vw,3rem) clamp(1.25rem,5vw,2.5rem);color:#fff;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(13,50,120,.2)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(249,115,22,.12);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(249,115,22,.08);pointer-events:none}

/* ══ PAGE HEADER ══ */
.page-hd{background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:var(--r-xl);padding:clamp(1.25rem,4vw,2rem);color:#fff;position:relative;overflow:hidden;margin-bottom:1.5rem}
.page-hd::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(249,115,22,.12);pointer-events:none}
.page-hd-tag{font-size:.65rem;font-weight:800;color:#fed7aa;letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem}
.page-hd-title{font-size:clamp(1.25rem,3.5vw,1.875rem);font-weight:900;font-family:'Space Grotesk',sans-serif;line-height:1.2}
.page-hd-sub{opacity:.72;font-size:.9rem;margin-top:.25rem}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r-md);border:1px solid var(--g100)}
.tbl{width:100%;border-collapse:collapse;font-size:.875rem}
.tbl th{padding:.75rem 1rem;text-align:left;font-size:.7rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;background:#f0f7ff;border-bottom:2px solid #dbeafe;white-space:nowrap}
.tbl td{padding:.75rem 1rem;border-bottom:1px solid var(--g100);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fafc}

/* ══ FORMS ══ */
.form-label{display:block;font-weight:600;font-size:.8rem;margin-bottom:.375rem;color:var(--g600)}
.form-input{width:100%;padding:.625rem .875rem;border:2px solid var(--g200);border-radius:var(--r-sm);font-size:.875rem;font-family:'Inter',sans-serif;outline:none;background:#fff;transition:border-color .15s;color:var(--g800)}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;padding:.625rem .875rem;border:2px solid var(--g200);border-radius:var(--r-sm);font-size:.875rem;font-family:'Inter',sans-serif;outline:none;background:#fff;color:var(--g800);cursor:pointer}
.form-select:focus{border-color:var(--blue)}

/* ══ BUTTONS ══ */
.back-btn{background:#fff;border:2px solid var(--g200);padding:.5rem 1rem;border-radius:var(--r-sm);cursor:pointer;font-weight:700;color:var(--g700);font-family:'Inter',sans-serif;font-size:.875rem;display:inline-flex;align-items:center;gap:.375rem;box-shadow:var(--sh-sm);transition:all .15s;white-space:nowrap}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ══ OVERLAY / MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9000;padding:1rem;backdrop-filter:blur(6px);animation:fadeIn .2s ease;overflow-y:auto}
.modal{background:#fff;border-radius:var(--r-xl);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-xl);animation:slideUp .25s ease}
.modal-hd{background:linear-gradient(100deg,var(--blue-dark),var(--blue));padding:1.125rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:.75rem}
.modal-body{flex:1;overflow-y:auto;padding:1.5rem}
.modal-ft{padding:1rem 1.5rem;border-top:1px solid var(--g100);display:flex;gap:.75rem;background:var(--g50);flex-shrink:0}

/* ══ TOAST ══ */
.toast-wrap{position:fixed;bottom:calc(var(--mob-tab-h) + .75rem);right:.75rem;left:.75rem;z-index:99999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{padding:.75rem 1.125rem;border-radius:10px;font-weight:600;font-size:.875rem;color:#fff;animation:slideUp .2s ease;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:all}

/* ══ SEARCH ══ */
.search-wrap{position:relative}
.search-icon{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none}
.search-input{width:100%;padding:.75rem .875rem .75rem 2.5rem;border:2px solid var(--g200);border-radius:var(--r-md);font-size:.9rem;font-family:'Inter',sans-serif;outline:none;background:#f8fafc;transition:border-color .15s;color:var(--g800)}
.search-input:focus{border-color:var(--blue);background:#fff}
.search-clear{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:var(--g200);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.72rem;color:var(--g600);display:flex;align-items:center;justify-content:center}
.search-dropdown{position:absolute;top:calc(100% + .375rem);left:0;right:0;background:#fff;border:1px solid var(--g200);border-radius:var(--r-md);box-shadow:var(--sh-xl);z-index:100;max-height:240px;overflow-y:auto}
.search-item{display:flex;align-items:center;gap:.75rem;padding:.625rem 1rem;cursor:pointer;border-bottom:1px solid var(--g50);transition:background .1s}
.search-item:hover{background:#eff6ff}
.search-item:last-child{border-bottom:none}

/* ══ SPINNER / EMPTY ══ */
.spinner{width:36px;height:36px;border:4px solid #dbeafe;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.empty{text-align:center;padding:3rem 1.5rem;background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.empty-icon{font-size:3rem;opacity:.25;margin-bottom:.875rem}

/* ══ SECTION HEADER ══ */
.sec-hd{background:linear-gradient(100deg,var(--blue-dark),var(--blue));padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.sec-num{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:1rem;font-family:'Space Grotesk',sans-serif;flex-shrink:0}

/* ══ ANIMATIONS ══ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  :root{--pad:.875rem;--nav-h:48px}
  body{font-size:14px}
  .nav-tabs,.nav-actions{display:none!important}
  .mob-tabbar{display:block!important}
  .toast-wrap{bottom:calc(var(--mob-tab-h) + .5rem)}
  .card-hover:hover{transform:none;box-shadow:var(--sh-sm)}
  .modal{border-radius:var(--r-xl) var(--r-xl) 0 0!important;max-height:95vh;width:100%!important;max-width:100%!important;margin-top:auto}
  .overlay{align-items:flex-end!important;padding:0!important}
  main{padding-bottom:calc(var(--mob-tab-h) + .5rem)}
  table{min-width:520px}
}
@media(max-width:480px){
  :root{--pad:.75rem}
  .hero{padding:1.5rem 1rem}
  .page-hd{padding:1.25rem 1rem}
}
@media(hover:none) and (pointer:coarse){
  .card-hover:active{opacity:.88}
  *{-webkit-tap-highlight-color:rgba(26,79,160,.12)}
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

/* ══ FIREBASE ══ */
const FB={

if(!firebase.apps.length)firebase.initializeApp(FB);
const db=firebase.firestore();

/* ══ DATA CONSTANTS ══ */
const BRANCHES=[

  {code:'ME',name:'Mechanical Engineering',short:'Mechanical',icon:'⚙️',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},

  {code:'DE',name:'Digital Electronics',short:'Digital',icon:'📡',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},

  {code:'PG',name:'Production Engineering',short:'Production',icon:'🔧',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},

  {code:'AE',name:'Agricultural Engineering',short:'Agri',icon:'🌾',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
];
const MODEL_ANSWER_BRANCHES=BRANCHES.filter(b=>!['CT','IC','IE','DE','AE','MN','FC','MU','PG','TX','PE','TM'].includes(b.code));
const MBRANCHES=[
  {code:'CO',name:'Computer Engineering',icon:'💻',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
  {code:'CE',name:'Civil Engineering',icon:'🏗️',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
  {code:'ME',name:'Mechanical Engineering',icon:'⚙️',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
  {code:'EJ',name:'Electronics Engineering',icon:'🔌',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
  {code:'EE',name:'Electrical Engineering',icon:'⚡',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
  {code:'AI',name:'Artificial Intelligence',icon:'🤖',color:'#1a4fa0',bg:'#dbeafe',dark:'#0d3278'},
];
const SYLLABUS_BRANCHES=[
  {code:'CO',name:'Computer Engineering',icon:'💻'},
  {code:'CH',name:'Chemical Engineering',icon:'⚗️'},
  {code:'AU',name:'Automobile Engineering',icon:'🚗'},
  {code:'CE',name:'Civil Engineering',icon:'🏗️'},
  {code:'ME',name:'Mechanical Engineering',icon:'⚙️'},
  {code:'EE',name:'Electrical Engineering',icon:'⚡'},
  {code:'ET',name:'Electronics & Telecommunication Engineering',icon:'📶'},
];
const SEMS=[1,2,3,4,5,6];
const bOf=code=>BRANCHES.find(b=>b.code===code)||{color:'#64748b',bg:'#f1f5f9',dark:'#334155',icon:'📄'};

/* ══ FIREBASE HELPERS ══ */
const fbLoad=async()=>{const s=await db.collection('papers').orderBy('ts','desc').get();return s.docs.map(d=>({id:d.id,...d.data()}));};
const fbAdd=async(data)=>{const r=await db.collection('papers').add({...data,ts:Date.now()});return{id:r.id,...data,ts:Date.now()};};
const fbDel=async(id)=>{await db.collection('papers').doc(id).delete();};
const fbLoadManual=async(br,s)=>{const snap=await db.collection('manualSubjects').where('branch','==',br).where('sem','==',s).get();return snap.docs.map(d=>({id:d.id,...d.data()}));};
const fbAddManual=async(data)=>{const r=await db.collection('manualSubjects').add({...data,ts:Date.now()});return{id:r.id,...data};};
const fbUpdateManual=async(id,data)=>{await db.collection('manualSubjects').doc(id).update(data);};
const fbDelManual=async(id)=>{await db.collection('manualSubjects').doc(id).delete();};
const fbLoadMPdf=async(br,s)=>{const snap=await db.collection('manualPdfs').where('branch','==',br).where('sem','==',s).get();return snap.docs.map(d=>({id:d.id,...d.data()}));};
const fbAddMPdf=async(data)=>{const r=await db.collection('manualPdfs').add({...data,ts:Date.now()});return{id:r.id,...data};};
const fbUpdateMPdf=async(id,data)=>{await db.collection('manualPdfs').doc(id).update(data);};
const fbDelMPdf=async(id)=>{await db.collection('manualPdfs').doc(id).delete();};
const fbLoadSyl=async(br,s)=>{const snap=await db.collection('syllabus').where('branch','==',br).where('sem','==',s).get();return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.subjectCode||'').localeCompare(b.subjectCode||''));};
const fbAddSyl=async(data)=>{const r=await db.collection('syllabus').add({...data,ts:Date.now()});return{id:r.id,...data,ts:Date.now()};};
const fbDelSyl=async(id)=>{await db.collection('syllabus').doc(id).delete();};
const fbUpdateSyl=async(id,br,s,data)=>{await db.collection('syllabus').doc(id).update(data);};

/* ══ TOAST ══ */
let _toasts=[];let _setToasts=null;
const toast=(msg,type='s')=>{const id=Date.now();_toasts=[..._toasts,{id,msg,type}];if(_setToasts)_setToasts([..._toasts]);setTimeout(()=>{_toasts=_toasts.filter(t=>t.id!==id);if(_setToasts)_setToasts([..._toasts]);},3500);};
function Toasts(){const [ts,setTs]=useState([]);useEffect(()=>{_setToasts=setTs;},[]);const colors={'s':'#16a34a','e':'#dc2626','i':'#0369a1','w':'#d97706'};return(<div className="toast-wrap">{ts.map(t=>(<div key={t.id} className="toast" style={{background:colors[t.type]||colors.s}}>{t.msg}</div>))}</div>);}

/* ══ EMBED HELPER ══ */
const embedUrl=url=>{if(!url)return'';const m=url.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return`https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;};
const dlUrl=url=>{if(!url)return'';const m=url.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;return url;};

/* ══════════════════════════════════════════════

function LoginPage({onLogin}){
  const [em,setEm]=useState('');const [pw,setPw]=useState('');const [busy,setBusy]=useState(false);
  const go=async()=>{if(!em||!pw){toast('Enter email and password','e');return;}setBusy(true);try{const r=await auth.signInWithEmailAndPassword(em,pw);onLogin(r.user);toast('Logged in','s');}catch(e){toast(e.message,'e');}setBusy(false);};
  return(
    <div style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem var(--pad)'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'clamp(1.5rem,5vw,2.5rem)',boxShadow:'var(--sh-md)',width:'100%',maxWidth:400}}>

        <p style={{color:'var(--g500)',fontSize:'.875rem',marginBottom:'1.5rem'}}>Sign in to manage content</p>

        <div style={{marginBottom:'1.5rem'}}>
          <label className="form-label">Password</label>
          <input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••••••"/>
        </div>
        <button onClick={go} disabled={busy} style={{width:'100%',background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',border:'none',padding:'.875rem',borderRadius:11,fontWeight:800,cursor:'pointer',fontSize:'1rem',fontFamily:'Inter',opacity:busy?.6:1}}>{busy?'Signing in...':'Sign In'}</button>

  );
}

  const b=selB?MBRANCHES.find(x=>x.code===selB):null;

  const delSubject=async(id)=>{if(!window.confirm('Delete?'))return;await fbDelManual(id);setSubjects(p=>p.filter(x=>x.id!==id));if(selSubject&&selSubject.id===id)setSelSubject(null);toast('Deleted','i');};

  const delPractical=(i)=>{const p=[...af.practicals];p.splice(i,1);setAf({...af,practicals:p});};
  // Inline practical helpers
  const startInline=(item)=>setInlinePrs({id:item.id,prs:[...(item.practicals||[]).map(p=>({...p}))],saving:false});
  const addInlinePr=()=>setInlinePrs(p=>({...p,prs:[...p.prs,{title:'',pdfUrl:''}]}));
  const updInlinePr=(i,k,v)=>setInlinePrs(p=>{const prs=[...p.prs];prs[i]={...prs[i],[k]:v};return{...p,prs};});
  const delInlinePr=(i)=>setInlinePrs(p=>{const prs=[...p.prs];prs.splice(i,1);return{...p,prs};});

    setInlinePrs(p=>({...p,saving:true}));

      await fbUpdateManual(inlinePrs.id,{practicals:inlinePrs.prs});

      setSelSubject(prev=>({...prev,practicals:inlinePrs.prs}));

      toast('Practicals saved!','s');

    <div className="page-wrap-sm">

                        <p style={{flex:1,fontWeight:600,fontSize:'clamp(.875rem,2vw,1rem)',color:'#1e293b',lineHeight:1.5,minWidth:0}}>{pr.title||`Practical ${j+1}`}</p>
                        {pr.pdfUrl
                          ?<button onClick={()=>setPdfView({title:pr.title||`Practical ${j+1}`,url:pr.pdfUrl})} style={{background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',border:'none',padding:'.55rem 1.375rem',borderRadius:9999,fontWeight:700,cursor:'pointer',fontSize:'clamp(.78rem,1.8vw,.9rem)',fontFamily:'Inter',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'.4rem',flexShrink:0,boxShadow:'0 4px 14px rgba(13,50,120,.25)',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.04)';e.currentTarget.style.boxShadow='0 6px 18px rgba(13,50,120,.32)';}} onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 4px 14px rgba(13,50,120,.25)';}}>👁 View PDF</button>
                          :<span style={{color:'#cbd5e1',fontSize:'.75rem',fontWeight:600,flexShrink:0}}>—</span>

                    onMouseEnter={e=>{e.currentTarget.style.border='2px solid #93c5fd';e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 12px 32px rgba(13,50,120,.14)';}}

                    <p style={{color:'#64748b',fontSize:'.82rem'}}>Manual Answer</p>

                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'auto'}}>
                      <span style={{color:'#334155',fontSize:'.875rem',fontWeight:700}}>{(item.practicals||[]).length} practical{(item.practicals||[]).length!==1?'s':''}</span>
                      <div style={{background:'#eff6ff',color:'#1a4fa0',fontSize:'.82rem',fontWeight:700,padding:'.4rem 1.125rem',borderRadius:9999,border:'1.5px solid #bfdbfe',transition:'all .15s',whiteSpace:'nowrap'}}

                    </div>
                    {/* Admin actions */}
                    {isAdmin&&(
                      <div style={{display:'flex',gap:'.5rem',paddingTop:'.625rem',borderTop:'1px solid #f1f5f9'}} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>openEdit(item)} style={{flex:1,background:'#fef3c7',color:'#92400e',border:'1px solid #fcd34d',padding:'.375rem',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:'.72rem',fontFamily:'Inter'}}>✏️ Edit</button>

                      </div>
                    )}
                  </div>
                ))}
              </div>
      }
    </div>
  );
}

/* ══════════════════════════════════════════════
   SYLLABUS PAGE
══════════════════════════════════════════════ */
function SyllabusPage({isAdmin}){
  const [selB,setSelB]=useState(null);const [searchQ,setSearchQ]=useState('');const [allData,setAllData]=useState({});const [loadingAll,setLoadingAll]=useState(false);const [selSubject,setSelSubject]=useState(null);const [showAdd,setShowAdd]=useState(false);const [editItem,setEditItem]=useState(null);const [addSem,setAddSem]=useState(1);const [af,setAf]=useState({subjectName:'',subjectCode:'',scheme:'K',pdfUrl:'',dlUrl:''});const [aBusy,setABusy]=useState(false);
  const b=selB?SYLLABUS_BRANCHES.find(x=>x.code===selB):null;
  const embed=url=>{if(!url)return'';const m=url.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return`https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;};
  useEffect(()=>{if(!selB){setAllData({});return;}setLoadingAll(true);Promise.all(SEMS.map(s=>fbLoadSyl(selB,s).then(list=>({s,list})))).then(results=>{const d={};results.forEach(({s,list})=>d[s]=list);setAllData(d);setLoadingAll(false);});},[selB]);
  const reloadSem=async(s)=>{const list=await fbLoadSyl(selB,s);setAllData(p=>({...p,[s]:list}));};
  const openAdd=(sem)=>{setAf({subjectName:'',subjectCode:'',scheme:'K',pdfUrl:'',dlUrl:''});setAddSem(sem);setEditItem(null);setShowAdd(true);};
  const openEdit=(item)=>{setAf({subjectName:item.subjectName||'',subjectCode:item.subjectCode||'',scheme:item.scheme||'K',pdfUrl:item.pdfUrl||'',dlUrl:item.dlUrl||''});setEditItem(item);setAddSem(item.sem);setShowAdd(true);};
  const saveSubject=async()=>{if(!af.subjectName||!af.subjectCode){toast('Name and code required','e');return;}setABusy(true);try{if(editItem){await fbUpdateSyl(editItem.id,selB,editItem.sem,{...af,branch:selB,sem:editItem.sem});await reloadSem(editItem.sem);if(selSubject&&selSubject.id===editItem.id)setSelSubject({...selSubject,...af});toast('Updated!','s');}else{await fbAddSyl({...af,branch:selB,sem:addSem});await reloadSem(addSem);toast('Added!','s');}setShowAdd(false);setEditItem(null);}catch(e){toast(e.message,'e');}setABusy(false);};
  const delSubject=async(item)=>{if(!window.confirm('Delete?'))return;await fbDelSyl(item.id);await reloadSem(item.sem);if(selSubject&&selSubject.id===item.id)setSelSubject(null);toast('Deleted','i');};

  return(
    <div className="page-wrap-sm">
      {showAdd&&(
        <div className="overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div><div style={{color:'#fff',fontWeight:800,fontSize:'1rem',fontFamily:"'Space Grotesk',sans-serif"}}>{editItem?'✏️ Edit Subject':'➕ Add Subject'}</div><div style={{color:'rgba(255,255,255,.6)',fontSize:'.75rem',marginTop:2}}>{b&&b.icon} {b&&b.name} · Semester {addSem}</div></div>
              <button onClick={()=>setShowAdd(false)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:34,height:34,borderRadius:'50%',cursor:'pointer',fontSize:'1rem'}}>✕</button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
              <div><label className="form-label">Subject Name *</label><input className="form-input" value={af.subjectName} onChange={e=>setAf({...af,subjectName:e.target.value})} placeholder="e.g. Data Structures Using C"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                <div><label className="form-label">Subject Code *</label><input className="form-input" value={af.subjectCode} onChange={e=>setAf({...af,subjectCode:e.target.value})} placeholder="e.g. 22317"/></div>
                <div><label className="form-label">Scheme</label><select className="form-select" value={af.scheme} onChange={e=>setAf({...af,scheme:e.target.value})}>{['K','I','J','G'].map(o=><option key={o}>{o}</option>)}</select></div>
              </div>
              <div style={{background:'#f0f7ff',border:'2px solid #bfdbfe',borderRadius:12,padding:'1rem'}}>
                <label className="form-label" style={{color:'#0d3278'}}>📄 View PDF URL</label>
                <input className="form-input" value={af.pdfUrl} onChange={e=>setAf({...af,pdfUrl:e.target.value})} placeholder="https://drive.google.com/file/d/xxx/view"/>
              </div>
              <div style={{background:'#fff7ed',border:'2px solid #fed7aa',borderRadius:12,padding:'1rem'}}>
                <label className="form-label" style={{color:'#92400e'}}>⬇ Download PDF URL</label>

      <div className="page-hd"><p className="page-hd-tag">MSBTE K SCHEME</p><h1 className="page-hd-title">📋 Syllabus</h1><p className="page-hd-sub">Select your branch to view subject-wise syllabus for all semesters</p></div>

            <span style={{fontSize:'.78rem',color:'var(--g500)',fontWeight:600}}>Selected:</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:'.375rem',background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',padding:'.3rem .875rem .3rem .625rem',borderRadius:9999,fontWeight:700,fontSize:'.82rem'}}>
              {b&&b.icon} {b&&b.name}
              <button onClick={()=>{setSelB(null);setAllData({});setSelSubject(null);}} style={{background:'rgba(255,255,255,.25)',border:'none',color:'#fff',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:'.65rem',marginLeft:'.25rem'}}>✕</button>
            </span>
          </div>
        )}
      </div>

      {/* Semester tables */}
      {!selSubject&&selB&&!loadingAll&&(
        <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
          {SEMS.map(s=>{
            const list=allData[s]||[];

              <div key={s} style={{background:'#fff',borderRadius:18,border:'1px solid var(--g100)',boxShadow:'var(--sh-sm)',overflow:'hidden'}}>

                  <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                    <div className="sec-num">{s}</div>

                      <p style={{color:'rgba(255,255,255,.6)',fontSize:'.72rem',marginTop:2}}>{list.length} subject{list.length!==1?'s':''}</p>
                    </div>
                  </div>

                </div>
                {list.length===0
                  ?<div style={{padding:'1.25rem 1.5rem',textAlign:'center',color:'var(--g400)',fontSize:'.85rem',background:'#fafafa'}}>
                    {isAdmin?<span>No subjects yet — <span onClick={()=>openAdd(s)} style={{color:'#1a4fa0',fontWeight:700,cursor:'pointer'}}>+ Add one</span></span>:'No subjects uploaded yet.'}
                  </div>
                  :<div className="tbl-wrap" style={{marginTop:0}}>
                    <table className="tbl">
                      <thead>
                        <tr>
                          <th style={{width:40}}>Sr.</th>
                          <th>Course Title</th>
                          <th style={{width:110}}>Course Code</th>
                          <th style={{width:100,textAlign:'center'}}>Syllabus</th>
                          {isAdmin&&<th style={{width:100,textAlign:'center'}}>Actions</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {list.map((item,i)=>(
                          <tr key={item.id}>
                            <td style={{color:'var(--g400)',fontWeight:700}}>{i+1}</td>
                            <td><span onClick={()=>setSelSubject({...item,sem:s})} style={{fontWeight:700,color:'#1a4fa0',fontSize:'.9rem',cursor:'pointer',fontFamily:"'Space Grotesk',sans-serif",textDecoration:'underline',textDecorationColor:'#bfdbfe',textUnderlineOffset:3}} onMouseEnter={e=>e.currentTarget.style.color='#0d3278'} onMouseLeave={e=>e.currentTarget.style.color='#1a4fa0'}>{item.subjectName}</span></td>
                            <td><span style={{background:'#f0f7ff',color:'#1a4fa0',fontSize:'.78rem',fontWeight:800,padding:'3px 9px',borderRadius:7,fontFamily:"'Space Grotesk',sans-serif"}}>{item.subjectCode}</span></td>
                            <td style={{textAlign:'center'}}>{item.pdfUrl?<button onClick={()=>setSelSubject({...item,sem:s})} style={{background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',border:'none',padding:'.35rem .875rem',borderRadius:8,fontWeight:700,cursor:'pointer',fontFamily:'Inter',fontSize:'.75rem',whiteSpace:'nowrap'}}>📋 View</button>:<span style={{color:'var(--g300)',fontSize:'.75rem',fontWeight:600}}>—</span>}</td>
                            {isAdmin&&<td style={{textAlign:'center'}}><div style={{display:'flex',gap:'.375rem',justifyContent:'center'}}><button onClick={()=>openEdit({...item,sem:s})} style={{background:'#fef3c7',color:'#92400e',border:'none',padding:'.3rem .625rem',borderRadius:6,fontWeight:700,cursor:'pointer',fontSize:'.72rem',fontFamily:'Inter'}}>✏️</button><button onClick={()=>delSubject({...item,sem:s})} style={{background:'#fee2e2',color:'#dc2626',border:'none',padding:'.3rem .625rem',borderRadius:6,fontWeight:700,cursor:'pointer',fontSize:'.72rem',fontFamily:'Inter'}}>🗑</button></div></td>}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                }
              </div>
            );
          })}
        </div>
      )}
      {!selSubject&&selB&&loadingAll&&<div style={{textAlign:'center',padding:'4rem'}}><div className="spinner"/><p style={{color:'var(--g400)',marginTop:'1rem',fontWeight:600}}>Loading all semesters...</p></div>}
      {!selSubject&&!selB&&<div className="empty"><div className="empty-icon">🔍</div><p style={{fontWeight:700,color:'var(--g600)'}}>Search and select a branch above</p><p style={{color:'var(--g400)',fontSize:'.875rem',marginTop:'.375rem'}}>Subject-wise syllabus for all 6 semesters will appear here</p></div>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   MANUAL PDF PAGE
══════════════════════════════════════════════ */
function ManualPdfPage({isAdmin}){
  const [selB,setSelB]=useState(null);const [selS,setSelS]=useState(null);const [subjects,setSubjects]=useState([]);const [loading,setLoading]=useState(false);const [searchQ,setSearchQ]=useState('');const [showAdd,setShowAdd]=useState(false);const [editItem,setEditItem]=useState(null);const [af,setAf]=useState({subjectName:'',subjectCode:'',scheme:'K',pdfFiles:[]});const [aBusy,setABusy]=useState(false);const [pdfView,setPdfView]=useState(null);
  const b=selB?MBRANCHES.find(x=>x.code===selB):null;
  useEffect(()=>{if(!selB||!selS)return;setLoading(true);fbLoadMPdf(selB,selS).then(list=>{setSubjects(list);setLoading(false);});},[selB,selS]);
  const openAdd=()=>{setAf({subjectName:'',subjectCode:'',scheme:'K',pdfFiles:[]});setEditItem(null);setShowAdd(true);};
  const openEdit=(item)=>{setAf({subjectName:item.subjectName||'',subjectCode:item.subjectCode||'',scheme:item.scheme||'K',pdfFiles:item.pdfFiles||[]});setEditItem(item);setShowAdd(true);};
  const addPdfFile=()=>setAf({...af,pdfFiles:[...af.pdfFiles,{url:''}]});
  const updatePdfFile=(i,v)=>{const p=[...af.pdfFiles];p[i]={url:v};setAf({...af,pdfFiles:p});};
  const removePdfFile=(i)=>{const p=[...af.pdfFiles];p.splice(i,1);setAf({...af,pdfFiles:p});};
  const saveSubject=async()=>{if(!af.subjectName||!af.subjectCode){toast('Name and code required','e');return;}setABusy(true);try{if(editItem){await fbUpdateMPdf(editItem.id,{...af,branch:selB,sem:selS});setSubjects(p=>p.map(x=>x.id===editItem.id?{...x,...af}:x));toast('Updated!','s');}else{const item=await fbAddMPdf({...af,branch:selB,sem:selS});setSubjects(p=>[...p,item]);toast('Added!','s');}setShowAdd(false);setEditItem(null);}catch(e){toast(e.message,'e');}setABusy(false);};
  const delSubject=async(id)=>{if(!window.confirm('Delete?'))return;await fbDelMPdf(id);setSubjects(p=>p.filter(x=>x.id!==id));toast('Deleted','i');};
  const schemeColor=(sc)=>({'K':['#0d3278','#1a4fa0','#dbeafe','#93c5fd','#eff6ff'],'I':['#065f46','#059669','#d1fae5','#6ee7b7','#ecfdf5'],'J':['#92400e','#d97706','#fef3c7','#fcd34d','#fffbeb'],'G':['#581c87','#7c3aed','#ede9fe','#c4b5fd','#f5f3ff']}[sc]||['#0d3278','#1a4fa0','#dbeafe','#93c5fd','#eff6ff']);
  const getDlLink=url=>{if(!url)return'';const m=url.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;return url;};

  if(!selB)return(
    <div className="page-wrap-sm">
      <div className="page-hd"><p className="page-hd-tag">K SCHEME - DOWNLOADABLE SUBJECT MANUALS</p><h1 className="page-hd-title">📥 Manual PDFs</h1><p className="page-hd-sub">Download subject manual PDFs — branch and semester wise</p></div>
      <div style={{background:'#fff',borderRadius:18,border:'1px solid var(--g100)',boxShadow:'var(--sh-sm)',padding:'clamp(.875rem,3vw,1.5rem)',marginBottom:'1.5rem'}}>
        <p style={{fontWeight:700,fontSize:'.75rem',color:'var(--g500)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'.75rem'}}>Select Branch</p>
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="search-input" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search branch e.g. CO, Civil, Computer..."/>
          {searchQ&&<button className="search-clear" onClick={()=>setSearchQ('')}>✕</button>}
          {searchQ&&(()=>{
            const filtered=MBRANCHES.filter(br=>br.name.toLowerCase().includes(searchQ.toLowerCase())||br.code.toLowerCase().includes(searchQ.toLowerCase()));
            return(
              <div className="search-dropdown">
                {filtered.length===0?<div style={{padding:'.875rem 1rem',color:'var(--g400)',fontSize:'.875rem',textAlign:'center'}}>No branch found</div>
                :filtered.map(br=>(
                  <div key={br.code} className="search-item" onClick={()=>{setSelB(br.code);setSearchQ('');}}>
                    <span style={{fontSize:'1.25rem'}}>{br.icon}</span>
                    <span style={{fontWeight:800,color:'#1a4fa0',fontSize:'.88rem',fontFamily:"'Space Grotesk',sans-serif",marginRight:'.375rem'}}>{br.code}</span>
                    <span style={{color:'var(--g600)',fontSize:'.85rem'}}>{br.name}</span>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
        {!searchQ&&<div style={{marginTop:'1rem',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(140px,45%),1fr))',gap:'.75rem'}}>
          {MBRANCHES.map((br,i)=>(
            <div key={br.code} onClick={()=>setSelB(br.code)}
              style={{background:'linear-gradient(135deg,#f8fafc,#eff6ff)',borderRadius:14,padding:'1.125rem .875rem',cursor:'pointer',textAlign:'center',border:'2px solid var(--g100)',transition:'all .2s',animation:`fadeUp ${.3+i*.07}s ease`}}
              onMouseEnter={e=>{e.currentTarget.style.background='linear-gradient(135deg,#dbeafe,#bfdbfe)';e.currentTarget.style.borderColor='#1a4fa0';e.currentTarget.style.transform='translateY(-4px)';}}
              onMouseLeave={e=>{e.currentTarget.style.background='linear-gradient(135deg,#f8fafc,#eff6ff)';e.currentTarget.style.borderColor='var(--g100)';e.currentTarget.style.transform='none';}}>
              <div style={{width:48,height:48,borderRadius:14,background:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem',margin:'0 auto .625rem'}}>{br.icon}</div>
              <div style={{fontWeight:800,color:'#0d3278',fontSize:'.875rem',fontFamily:"'Space Grotesk',sans-serif"}}>{br.code}</div>
              <div style={{fontSize:'.68rem',color:'var(--g500)',marginTop:3}}>{br.name}</div>
              <div style={{marginTop:'.5rem',background:'#dbeafe',color:'#0d3278',fontSize:'.62rem',fontWeight:700,padding:'3px 9px',borderRadius:9999,display:'inline-block'}}>6 Sems</div>
            </div>
          ))}
        </div>}
      </div>
    </div>
  );

  if(!selS)return(
    <div className="page-wrap-sm">
      <div className="page-hd"><p className="page-hd-tag">K SCHEME - DOWNLOADABLE SUBJECT MANUALS</p><h1 className="page-hd-title">📥 Manual PDFs</h1></div>
      <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
        <button className="back-btn" onClick={()=>setSelB(null)}>← Back</button>
        <h2 style={{fontSize:'1.5rem',fontWeight:800,fontFamily:"'Space Grotesk',sans-serif"}}>{b.icon} {b.name}</h2>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'.625rem'}}>
        {SEMS.map(s=>(
          <button key={s} onClick={()=>setSelS(s)} style={{background:'#fff',border:'2px solid var(--g200)',borderRadius:14,padding:'1rem',cursor:'pointer',fontFamily:'Inter',flex:'1 1 calc(33% - .5rem)',minWidth:80,maxWidth:160,textAlign:'center',transition:'all .2s',boxShadow:'var(--sh-sm)'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#1a4fa0';e.currentTarget.style.transform='translateY(-3px)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--g200)';e.currentTarget.style.transform='none';}}>
            <div style={{fontSize:'2rem',fontWeight:900,color:'#1a4fa0',fontFamily:"'Space Grotesk',sans-serif"}}>{s}</div>
            <div style={{fontSize:'.8rem',color:'var(--g500)',marginTop:4}}>Semester {s}</div>
          </button>
        ))}
      </div>
    </div>
  );

  return(
    <div className="page-wrap-sm">
      {pdfView&&(
        <div className="overlay" onClick={()=>setPdfView(null)}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:900,maxHeight:'92vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'var(--sh-xl)'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'linear-gradient(100deg,#0d3278,#1a4fa0)',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{color:'#fff',fontWeight:700}}>{pdfView.title}</div>
              <button onClick={()=>setPdfView(null)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:34,height:34,borderRadius:'50%',cursor:'pointer',fontSize:'1rem'}}>✕</button>
            </div>
            <div style={{flex:1,minHeight:500,background:'#374151'}}><iframe src={embedUrl(pdfView.url)} style={{width:'100%',height:'100%',minHeight:500,border:'none'}} title={pdfView.title} allowFullScreen/></div>
          </div>
        </div>
      )}
      {showAdd&&(
        <div className="overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div><div style={{color:'#fff',fontWeight:800,fontSize:'1rem',fontFamily:"'Space Grotesk',sans-serif"}}>{editItem?'Edit Subject PDF':'Add Subject PDF'}</div></div>
              <button onClick={()=>setShowAdd(false)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:34,height:34,borderRadius:'50%',cursor:'pointer',fontSize:'1rem'}}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
                <div style={{gridColumn:'1/3'}}><label className="form-label">Subject Name *</label><input className="form-input" value={af.subjectName||''} onChange={e=>setAf({...af,subjectName:e.target.value})} placeholder="e.g. Data Structures Using C"/></div>
                <div><label className="form-label">Subject Code *</label><input className="form-input" value={af.subjectCode||''} onChange={e=>setAf({...af,subjectCode:e.target.value})} placeholder="e.g. 22317"/></div>
                <div><label className="form-label">Scheme</label><select className="form-select" value={af.scheme||'K'} onChange={e=>setAf({...af,scheme:e.target.value})}>{['K','I','J','G'].map(o=><option key={o}>{o}</option>)}</select></div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
                <label style={{fontWeight:700,fontSize:'.9rem',color:'var(--g700)'}}>PDF Files</label>
                <button onClick={addPdfFile} style={{background:'linear-gradient(135deg,#dbeafe,#bfdbfe)',color:'#0d3278',border:'none',padding:'.4rem .875rem',borderRadius:8,fontWeight:700,cursor:'pointer',fontFamily:'Inter',fontSize:'.8rem'}}>+ Add PDF</button>
              </div>
              {(af.pdfFiles||[]).length===0&&<div style={{background:'var(--g50)',border:'2px dashed var(--g200)',borderRadius:12,padding:'1.5rem',textAlign:'center',color:'var(--g400)'}}><div style={{fontSize:'2rem',marginBottom:'.5rem'}}>📄</div><p style={{fontSize:'.875rem',fontWeight:600}}>No PDFs added yet</p></div>}

/* ══════════════════════════════════════════════
   CONTACT PAGE
══════════════════════════════════════════════ */
function ContactPage(){
  const [form,setForm]=useState({name:'',email:'',subject:'',message:''});const [busy,setBusy]=useState(false);const [sent,setSent]=useState(false);
  const submit=async()=>{if(!form.name||!form.email||!form.message){toast('Please fill all required fields','e');return;}setBusy(true);try{await db.collection('contactMessages').add({...form,ts:Date.now(),status:'new'});setSent(true);toast('Message sent!','s');}catch(e){toast(e.message,'e');}setBusy(false);};
  return(
    <div style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem var(--pad)'}}>
      {sent?
        <div style={{textAlign:'center',background:'#fff',borderRadius:20,padding:'3rem 2rem',boxShadow:'var(--sh-md)',maxWidth:400,width:'100%'}}>
          <div style={{fontSize:'3rem',marginBottom:'1rem'}}>✅</div>
          <h2 style={{fontWeight:800,fontSize:'1.5rem',fontFamily:"'Space Grotesk',sans-serif",marginBottom:'.5rem'}}>Message Sent!</h2>
          <p style={{color:'var(--g500)',fontSize:'.9rem',lineHeight:1.6}}>Thank you for contacting us. We'll get back to you soon.</p>
          <button onClick={()=>setSent(false)} style={{marginTop:'1.5rem',background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',border:'none',padding:'.75rem 1.5rem',borderRadius:10,fontWeight:700,cursor:'pointer',fontFamily:'Inter'}}>Send Another</button>
        </div>
      :
        <div style={{background:'#fff',borderRadius:20,padding:'clamp(1.25rem,4vw,2rem)',boxShadow:'var(--sh-md)',width:'100%',maxWidth:560}}>
          <h2 style={{fontWeight:800,fontSize:'1.5rem',fontFamily:"'Space Grotesk',sans-serif",marginBottom:'.25rem'}}>📧 Contact Us</h2>
          <p style={{color:'var(--g500)',fontSize:'.875rem',marginBottom:'1.5rem'}}>Have questions? We'd love to hear from you.</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
            <div><label className="form-label">Name *</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Your name"/></div>
            <div><label className="form-label">Email *</label><input className="form-input" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="your@email.com"/></div>
          </div>
          <div style={{marginBottom:'1rem'}}><label className="form-label">Subject</label><input className="form-input" value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})} placeholder="What is this about?"/></div>
          <div style={{marginBottom:'1.5rem'}}><label className="form-label">Message *</label><textarea className="form-input" value={form.message} onChange={e=>setForm({...form,message:e.target.value})} placeholder="Your message..." rows={5} style={{resize:'vertical'}}/></div>
          <button onClick={submit} disabled={busy} style={{width:'100%',background:'linear-gradient(135deg,#0d3278,#1a4fa0)',color:'#fff',border:'none',padding:'.875rem',borderRadius:11,fontWeight:800,cursor:'pointer',fontSize:'1rem',fontFamily:'Inter',opacity:busy?.6:1}}>{busy?'Sending...':'Send Message'}</button>
        </div>
      }
    </div>
  );
}

            <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
              {whyItems.map((item,i)=>(
                <div key={i} style={{border:`2px solid ${activeWhy===i?'#1a4fa0':'#e2e8f0'}`,borderRadius:16,overflow:'hidden',transition:'all .2s',background:activeWhy===i?'#eff6ff':'#fff',cursor:'pointer'}} onClick={()=>setActiveWhy(activeWhy===i?-1:i)}>
                  <div style={{padding:'1rem 1.25rem',display:'flex',alignItems:'center',gap:'.875rem'}}>
                    <div style={{width:36,height:36,borderRadius:10,background:activeWhy===i?'#1a4fa0':'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',flexShrink:0,transition:'all .2s'}}>{item.icon}</div>
                    <span style={{fontWeight:700,fontSize:'.9375rem',color:activeWhy===i?'#0d3278':'#334155',flex:1}}>{item.title}</span>
                    <span style={{color:activeWhy===i?'#1a4fa0':'#94a3b8',fontSize:'1.1rem',fontWeight:700,transition:'transform .2s',transform:activeWhy===i?'rotate(45deg)':'none',display:'inline-block'}}>+</span>
                  </div>
                  {activeWhy===i&&<div style={{padding:'0 1.25rem 1rem 4.125rem',color:'#475569',fontSize:'.875rem',lineHeight:1.7,animation:'fadeUp .2s ease'}}>{item.desc}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── Section 4: CTA ── */}
      <div style={{background:'linear-gradient(135deg,#0d3278,#1a4fa0)',padding:'clamp(3rem,6vw,4rem) var(--pad)',textAlign:'center'}}>
        <div style={{maxWidth:600,margin:'0 auto'}}>
          <h2 style={{fontSize:'clamp(1.5rem,3.5vw,2rem)',fontWeight:900,fontFamily:"'Space Grotesk',sans-serif",color:'#fff',marginBottom:'.875rem'}}>Start Studying For Free Today</h2>
          <p style={{color:'rgba(255,255,255,.72)',fontSize:'clamp(.875rem,2vw,1rem)',lineHeight:1.7,marginBottom:'2rem'}}>Join thousands of MSBTE diploma students who use our portal to prepare for their exams. No signup needed.</p>
          <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
            <button onClick={()=>nav('browse')} style={{background:'#f97316',border:'none',color:'#fff',padding:'.875rem 2rem',borderRadius:12,fontWeight:800,cursor:'pointer',fontSize:'1rem',fontFamily:'Inter'}}>📂 Browse Papers</button>
            <button onClick={()=>nav('syllabus')} style={{background:'rgba(255,255,255,.15)',border:'2px solid rgba(255,255,255,.35)',color:'#fff',padding:'.875rem 2rem',borderRadius:12,fontWeight:700,cursor:'pointer',fontSize:'1rem',fontFamily:'Inter'}}>📋 View Syllabus</button>
          </div>
        </div>
      </div>

    </div>
  );
}

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
function Footer({nav}){
  return(
    <footer style={{background:'#0f172a',color:'#64748b',padding:'clamp(1.5rem,4vw,2.5rem) var(--pad)',marginTop:'2rem'}}>
      <div style={{maxWidth:'var(--max-w)',margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:'2rem',marginBottom:'2rem'}}>
          <div style={{maxWidth:300}}>
            <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'.875rem'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#0d3278,#1a4fa0)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem'}}>📚</div>
              <span style={{color:'#fff',fontWeight:800,fontFamily:"'Space Grotesk',sans-serif"}}>MSBTE Study Portal</span>
            </div>
            <p style={{fontSize:'.875rem',lineHeight:1.6}}>Free model answer papers, practical manuals, and syllabus for all MSBTE diploma branches.</p>
          </div>
          <div>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:'.875rem'}}>Navigation</p>
            {[['home','Home'],['browse','Browse'],['manual','Manual'],['syllabus','Syllabus'],['manualpdf','Manual PDF'],['contact','Contact'],['about','About Us'],['privacy','Privacy Policy']].map(([p,l])=>(
              <div key={p} onClick={()=>nav(p)} style={{color:'#64748b',fontSize:'.875rem',marginBottom:'.5rem',cursor:'pointer',transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color='#f97316'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>{l}</div>
            ))}
          </div>
        </div>
        <div style={{borderTop:'1px solid #1e293b',paddingTop:'1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'1rem'}}>
          <p style={{fontSize:'.8125rem'}}>&copy; 2025 MSBTE Study Portal. Free forever.</p>
          <div style={{display:'flex',gap:'1.5rem',flexWrap:'wrap'}}>
            <span onClick={()=>nav('privacy')} style={{fontSize:'.8125rem',cursor:'pointer',color:'#64748b',display:'flex',alignItems:'center',gap:'.35rem',transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color='#f97316'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>👥 Privacy Policy</span>
            <span onClick={()=>nav('about')} style={{fontSize:'.8125rem',cursor:'pointer',color:'#64748b',display:'flex',alignItems:'center',gap:'.35rem',transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color='#f97316'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>&#x2139;&#xfe0f; About Us</span>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const [page,setPage]=useState('home');const [papers,setPapers]=useState([]);const [user,setUser]=useState(null);const [loading,setLoading]=useState(true);const [viewPaper,setViewPaper]=useState(null);
  const nav=p=>setPage(p);
  const logout=async()=>{try{await auth.signOut();}catch(e){}setUser(null);nav('home');toast('Logged out','i');};
  useEffect(()=>{fbLoad().then(p=>{setPapers(p);setLoading(false);});auth.onAuthStateChanged(u=>setUser(u));},[]);

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem',background:'#eef2f9'}}>
      <div style={{width:48,height:48,border:'5px solid #dbeafe',borderTopColor:'#1a4fa0',borderRadius:'50%',animation:'spin .75s linear infinite'}}/>
      <p style={{color:'#1a4fa0',fontWeight:700}}>Loading MSBTE Portal...</p>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',overflowX:'hidden'}}>
      <Navbar page={page} nav={nav} user={user} logout={logout}/>
      {viewPaper&&<PdfModal paper={viewPaper} onClose={()=>setViewPaper(null)}/>}
      <main style={{flex:1,minWidth:0,overflowX:'hidden'}}>
        {page==='home'&&<HomePage papers={papers} nav={nav}/>}
        {page==='browse'&&<BrowsePage papers={papers} onView={setViewPaper} isAdmin={!!user} onDel={id=>{fbDel(id);setPapers(p=>p.filter(x=>x.id!==id));}}/>}
        {page==='contact'&&<ContactPage/>}
        {page==='login'&&<LoginPage onLogin={u=>{setUser(u);nav('admin');}}/>}
        {(page==='admin'&&!user)&&<LoginPage onLogin={u=>{setUser(u);nav('admin');}}/>}
        {(page==='admin'&&!!user)&&<AdminPanel papers={papers} onAdd={p=>setPapers(prev=>[p,...prev])} onDel={id=>setPapers(p=>p.filter(x=>x.id!==id))}/>}
        {page==='manual'&&<ManualPage isAdmin={!!user}/>}
        {page==='syllabus'&&<SyllabusPage isAdmin={!!user}/>}
        {page==='manualpdf'&&<ManualPdfPage isAdmin={!!user}/>}
        {page==='privacy'&&<PrivacyPage nav={nav}/>}
        {page==='about'&&<AboutPage nav={nav}/>}
      </main>
      <Footer nav={nav}/>
      <Toasts/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
